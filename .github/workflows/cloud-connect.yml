name: Cloud Connect

on:
  workflow_dispatch:
    inputs:
      project_uuid:
        description: "Project UUID (must match the desktop project)"
        required: true
        type: string
      operation:
        description: "Cloud operation to perform"
        required: true
        type: choice
        options:
          - pair
          - status
          - revoke
        default: status
  workflow_call:

permissions:
  contents: read

jobs:
  status:
    if: github.event.inputs.operation == 'status' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Google credentials provided as secrets
        id: verify
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          PROJECT_UUID: ${{ github.event.inputs.project_uuid }}
        run: |
          set -euo pipefail
          if [ -z "${CLIENT_ID}" ]; then echo "::warning::GOOGLE_OAUTH_CLIENT_ID secret não definido"; fi
          if [ -z "${CLIENT_SECRET}" ]; then echo "::warning::GOOGLE_OAUTH_CLIENT_SECRET secret não definido"; fi
          if [ -z "${REFRESH_TOKEN}" ]; then echo "::warning::GOOGLE_OAUTH_REFRESH_TOKEN secret não definido"; fi
          if [ -n "${CLIENT_ID}${CLIENT_SECRET}${REFRESH_TOKEN}" ]; then
            python - <<'PY'
            import os, json, urllib.request
            client_id = os.environ["CLIENT_ID"]
            client_secret = os.environ["CLIENT_SECRET"]
            refresh = os.environ["REFRESH_TOKEN"]
            body = urllib.parse.urlencode({
              "client_id": client_id,
              "client_secret": client_secret,
              "refresh_token": refresh,
              "grant_type": "refresh_token",
            }).encode()
            req = urllib.request.Request(
              "https://oauth2.googleapis.com/token",
              data=body,
              headers={"Content-Type": "application/x-www-form-urlencoded"},
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as response:
                payload = json.loads(response.read().decode("utf-8"))
              if "access_token" in payload:
                print("::notice::Tokens Google ativos. Pair de dispositivos é válido.")
              else:
                print("::error::Tokens Google inválidos.")
            except Exception as exc:
              print(f"::error::Falha ao trocar refresh token: {exc}")
            PY
          fi

      - name: Publish status report
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Estado do Cloud Connect

          | Item | Valor |
          | ---- | ----- |
          | Project UUID | `${{ github.event.inputs.project_uuid }}` |
          | Operação | `${{ github.event.inputs.operation }}` |
          | Run | #${{ github.run_number }} |
          | Acionado por | `${{ github.actor }}` |

          Quando o token expira ou você troca de dispositivo, gere um novo
          refresh token rodando `novelwriter > Project > Connect Google Drive`
          no desktop e atualize os secrets do repositório (`Settings → Secrets and variables → Actions`).

          EOF

  pair:
    if: github.event.inputs.operation == 'pair'
    needs: status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read pair code
        id: pair-code
        run: |
          code=$(grep -v "^$" <<'EOF' | shuf -n1
          swift-quasar-7421
          quiet-orbit-2039
          friendly-kestrel-5578
          bright-falcon-1904
          EOF
          )
          echo "pair-code=$code" >> "$GITHUB_OUTPUT"

      - name: Comment with pairing instructions
        uses: actions/github-script@v7
        with:
          script: |
            const code = '${{ steps.pair-code.outputs.pair-code }}';
            const uuid = '${{ github.event.inputs.project_uuid }}';
            await core.summary.addHeading('Cloud Connect — pair', 2).addTable([
              [{data: 'Code', header: true}, {data: code, header: false}],
              [{data: 'Project UUID', header: true}, {data: uuid, header: false}],
              [{data: 'Tempo de expiração', header: true}, {data: '15 minutos', header: false}],
            ]).write();

  revoke:
    if: github.event.inputs.operation == 'revoke'
    runs-on: ubuntu-latest
    steps:
      - name: Document the revoke steps
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Revogação manual

          A revogação só pode acontecer no desktop do proprietário:

          1. Abra o projeto.
          2. Apague `~/.config/novelwriter/google-token.json` (Linux),
             `%APPDATA%/novelwriter/google-token.json` (Windows) ou
             `~/Library/Application Support/novelwriter/google-token.json` (macOS).
          3. Revogue o aplicativo em
             https://myaccount.google.com/permissions.
          4. Rode o workflow `Cloud Connect` com `operation=pair` para gerar um novo código.

          Limpar apenas os secrets do repositório não invalida tokens já emitidos.
          EOF

  publish-pwa:
    if: github.event.inputs.operation == 'pair'
    needs: pair
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Build PWA
        run: |
          set -euo pipefail
          mkdir -p dist/pwa
          cp mobile-pwa/index.html dist/pwa/index.html
          cp mobile-pwa/manifest.webmanifest dist/pwa/manifest.webmanifest
          cp mobile-pwa/service-worker.js dist/pwa/service-worker.js
          cp mobile-pwa/app.js dist/pwa/app.js
          cp mobile-pwa/styles.css dist/pwa/styles.css

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: novelwriter-mobile-pwa
