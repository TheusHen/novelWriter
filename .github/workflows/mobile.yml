name: Mobile Companion Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Mobile build target"
        required: true
        type: choice
        options:
          - android
          - ios
          - pwa
        default: android
  push:
    tags:
      - "v*"
  workflow_call:

permissions:
  contents: read

jobs:
  build-android:
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.target == 'android')
      || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java (Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Briefcase
        run: python -m pip install --upgrade briefcase

      - name: Install Android SDK packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            android-sdk-build-tools \
            android-sdk-platform-tools

      - name: Build Android package (best-effort)
        id: build
        run: |
          set +e
          briefcase create android 2>&1 | tee briefcase-create.log
          CREATE_RC=${PIPESTATUS[0]}
          briefcase build android 2>&1 | tee briefcase-build.log
          BUILD_RC=${PIPESTATUS[0]}
          briefcase package android 2>&1 | tee briefcase-package.log
          PACKAGE_RC=${PIPESTATUS[0]}
          if [ $CREATE_RC -ne 0 ] || [ $BUILD_RC -ne 0 ] || [ $PACKAGE_RC -ne 0 ]; then
            echo "Briefcase packaging is unavailable in this environment. Uploading a static Android assets bundle instead." >> "$GITHUB_STEP_SUMMARY"
            echo "briefcase_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "briefcase_failed=false" >> "$GITHUB_OUTPUT"

      - name: Upload Briefcase artefact (when available)
        if: steps.build.outputs.briefcase_failed == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: novelwriter-android-debug
          path: |
            android/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Package mobile-assets bundle (always)
        uses: actions/upload-artifact@v4
        with:
          name: novelwriter-mobile-assets
          path: |
            docs/source/index.rst
            novelwriter/assets/**
          if-no-files-found: ignore
          retention-days: 14

  build-ios:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'ios'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: python -m pip install --upgrade briefcase

      - name: Build iOS package (best-effort)
        run: |
          set +e
          briefcase create ios || echo "Briefcase iOS scaffolding unavailable – producing documentation bundle only."
          briefcase build ios || true
          briefcase package ios || true

      - name: Package mobile-assets bundle
        uses: actions/upload-artifact@v4
        with:
          name: novelwriter-mobile-assets
          path: |
            novelwriter/assets/**
          if-no-files-found: ignore
          retention-days: 14

  build-pwa:
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pwa')
      || startsWith(github.ref, 'refs/tags/v')
      || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Progressive Web App companion
        run: |
          set -euo pipefail
          mkdir -p dist/pwa
          cp mobile-pwa/index.html dist/pwa/index.html
          cp mobile-pwa/manifest.webmanifest dist/pwa/manifest.webmanifest
          cp mobile-pwa/service-worker.js dist/pwa/service-worker.js
          cp mobile-pwa/app.js dist/pwa/app.js
          cp mobile-pwa/styles.css dist/pwa/styles.css
          cp -R mobile-pwa/icons dist/pwa/icons
          ls -la dist/pwa

      - name: Upload PWA artefact
        uses: actions/upload-artifact@v4
        with:
          name: novelwriter-mobile-pwa
          path: dist/pwa/**
          if-no-files-found: error
          retention-days: 14

  publish-pwa:
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pwa')
      || startsWith(github.ref, 'refs/tags/v')
    needs: build-pwa
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Progressive Web App companion
        run: |
          set -euo pipefail
          mkdir -p dist/pwa
          cp mobile-pwa/index.html dist/pwa/index.html
          cp mobile-pwa/manifest.webmanifest dist/pwa/manifest.webmanifest
          cp mobile-pwa/service-worker.js dist/pwa/service-worker.js
          cp mobile-pwa/app.js dist/pwa/app.js
          cp mobile-pwa/styles.css dist/pwa/styles.css
          cp -R mobile-pwa/icons dist/pwa/icons

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pwa

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
